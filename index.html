<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teleprompter & Slides</title>

<style>

body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:#0b0f14;
    color:white;
    text-align:center;
}

.container{
    max-width:1100px;
    margin:auto;
    padding:40px 20px;
}

.logo{
    width:80px;
    margin-bottom:20px;
}

h1{
    font-size:48px;
    margin-bottom:10px;
}

.highlight{
    color:#00e5ff;
}

p{
    color:#cfcfcf;
    font-size:18px;
    max-width:600px;
    margin:auto;
}

.buttons{
    margin-top:30px;
}

.btn{
    padding:14px 28px;
    border-radius:30px;
    text-decoration:none;
    font-weight:bold;
    margin:10px;
    display:inline-block;
}

.btn-download{
    background:#2563eb;
    color:white;
}

.btn-whatsapp{
    background:#22c55e;
    color:white;
}

.section{
    margin-top:80px;
}

.section h2{
    color:#00e5ff;
}

.images{
    display:flex;
    justify-content:center;
    gap:40px;
    margin-top:30px;
    flex-wrap:wrap;
}

.card{
    background:#111827;
    padding:20px;
    border-radius:10px;
}

.card img{
    width:400px;
    border-radius:6px;
}

.caption{
    margin-top:10px;
    color:#9ca3af;
    font-size:14px;
}

</style>

</head>
<body>

<div class="container">

<img src="logo.png" class="logo">

<h1>
<span class="highlight">Teleprompter</span> & Slides
</h1>

<p>
A solução definitiva para oradores, pastores e criadores de conteúdo.
Segurança em nuvem, controle de velocidade e visualização impecável.
</p>

<div class="buttons">

<a href="#" class="btn btn-download">
⬇ Baixar Grátis
</a>

<a href="#" class="btn btn-whatsapp">
Suporte WhatsApp
</a>

</div>


<div class="section">

<h2>Conheça a Interface</h2>

<div class="images">

<div class="card">
<img src="interface-clara.png">
<div class="caption">INTERFACE CLARA</div>
</div>

<div class="card">
<img src="interface-escura.png">
<div class="caption">MODO ESCURO</div>
</div>

</div>

</div>

</div>

</body>
</html>
